name: Aero-KV Core Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22'] # Tests across multiple Go versions automatically

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Verify Dependencies
      run: go mod tidy

    - name: Run Race Detector & Core Tests
      run: go test ./core/... -v -race

    - name: Run Root API Tests
      run: go test ./... -v
